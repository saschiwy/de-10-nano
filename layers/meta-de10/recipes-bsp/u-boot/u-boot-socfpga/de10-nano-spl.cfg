# DE10-Nano SPL/U-Boot defaults for Yocto WIC layout.
# Keep this in sync with sdimage-cyclone5-arria5.wks rawcopy partition.

# Prevent early reset loops in SPL path.
# CONFIG_SPL_WATCHDOG is not set

# Load U-Boot from first partition of type 0xa2, then apply sector offset.
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_USE_PARTITION=y
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_USE_PARTITION_TYPE=y
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_PARTITION_TYPE=0xa2

# Boot automatically without user interaction timeout.
CONFIG_BOOTDELAY=2
CONFIG_USE_BOOTCOMMAND=y
CONFIG_BOOTCOMMAND="run distro_bootcmd"